name: Sync bun.lock for Dependabot

# Dependabot only knows about npm — when it bumps a package in
# src/dashboard/package.json it does NOT regenerate the workspace-root
# bun.lock, and CI's `bun install --frozen-lockfile` then fails with a
# lockfile drift. This workflow auto-runs `bun install` from the workspace
# root on Dependabot PRs that touch the dashboard's package.json and
# commits the refreshed lockfile back to the PR branch so CI can go green
# without a manual sync commit.
#
# Trigger is `pull_request_target` so the workflow runs with write access
# to the base repo (needed to push the lockfile back); we still gate on
# `github.actor == 'dependabot[bot]'` so an external contributor cannot
# repurpose this surface to push arbitrary commits.
#
# The lockfile-sync commit is pushed with a GitHub App installation token
# (when configured) so that the push re-triggers required CI checks.
# GitHub deliberately does not trigger new workflow runs from pushes made
# with GITHUB_TOKEN (recursion guard), which would leave the PR blocked on
# required status checks. The App token is short-lived (~1 h) and therefore
# security-equivalent to GITHUB_TOKEN in token lifetime. When the App is not
# configured (vars.LOCK_BOT_APP_ID is empty) the workflow falls back to
# GITHUB_TOKEN — the lockfile is still synced, but CI must be re-triggered
# manually (close/reopen the PR or push an empty commit).

on:
  pull_request_target:
    paths:
      - "src/dashboard/package.json"

permissions:
  contents: write

env:
  BUN_VERSION: "1.3.x"

jobs:
  sync-lockfile:
    name: Sync bun.lock
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Mint GitHub App token
        id: app-token
        if: ${{ vars.LOCK_BOT_APP_ID != '' }}
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.LOCK_BOT_APP_ID }}
          private-key: ${{ secrets.LOCK_BOT_PRIVATE_KEY }}

      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Regenerate lockfile (workspace root)
        run: bun install

      - name: Commit and push if lockfile changed
        run: |
          if git diff --quiet bun.lock; then
            echo "::notice::bun.lock is already in sync with package.json"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bun.lock
          git commit -m "chore(deps): sync bun.lock with package.json"
          git push
