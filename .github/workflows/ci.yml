name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: "10.0.x"
  NODE_VERSION: "20"

jobs:
  backend:
    name: Backend (build + test)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: webhookengine_test
          POSTGRES_USER: webhookengine
          POSTGRES_PASSWORD: webhookengine
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U webhookengine"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore WebhookEngine.sln

      - name: Build
        run: dotnet build WebhookEngine.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test WebhookEngine.sln --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage"
        env:
          ConnectionStrings__Default: "Host=localhost;Port=5432;Database=webhookengine_test;Username=webhookengine;Password=webhookengine"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: "**/test-results.trx"

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: "**/coverage.cobertura.xml"

  frontend:
    name: Frontend (build + lint)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/dashboard

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: src/dashboard/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

      - name: Type check
        run: yarn typecheck

      - name: Build
        run: yarn build

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: webhook-engine:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
