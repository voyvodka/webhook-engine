name: Release

on:
  push:
    tags:
      - "v*"

# Least-privilege token: Docker Hub and NuGet are authenticated via repository
# secrets (DOCKERHUB_TOKEN, NUGET_API_KEY), not the GITHUB_TOKEN. The workflow
# only needs to read source code; no GITHUB_TOKEN write scope is required.
# id-token: write is intentionally omitted — provenance attestations are
# disabled (provenance: false / sbom: false) so OIDC is not needed.
permissions:
  contents: read

env:
  DOTNET_VERSION: "10.0.x"

jobs:
  docker:
    name: Publish Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # QEMU is required for the linux/arm64 leg of the manifest list.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: voyvodka/webhook-engine
          tags: |
            type=match,pattern=v(.*),group=1
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          # Force a fresh pull so upstream base-image security patches are
          # not shadowed by the GHA build cache.
          pull: true
          # Skip provenance/SBOM attestations — they show up on Docker Hub
          # as a phantom "unknown/unknown" tag entry.
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Requires DOCKERHUB_TOKEN with the `repo:write_metadata` scope.
      # See docs/RELEASE.md §1 for the operator setup steps.
      - name: Sync Docker Hub description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: voyvodka/webhook-engine
          short-description: "Self-hosted webhook delivery platform — PostgreSQL queue, retry, HMAC signing, React dashboard."
          readme-filepath: ./README.md

  nuget:
    name: Publish NuGet Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Resolve version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore src/WebhookEngine.Sdk/WebhookEngine.Sdk.csproj

      - name: Build SDK
        run: dotnet build src/WebhookEngine.Sdk/WebhookEngine.Sdk.csproj --configuration Release --no-restore

      - name: Pack SDK
        run: dotnet pack src/WebhookEngine.Sdk/WebhookEngine.Sdk.csproj --configuration Release --no-build --output artifacts/nuget /p:ContinuousIntegrationBuild=true /p:PackageVersion=${{ steps.version.outputs.value }}

      - name: Publish to NuGet
        run: dotnet nuget push "artifacts/nuget/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source "https://api.nuget.org/v3/index.json" --skip-duplicate
