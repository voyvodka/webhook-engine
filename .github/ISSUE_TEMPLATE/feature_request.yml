name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement", "status: needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe the problem and your proposed solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? What's missing today?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work? Include API examples, UI mockups, or code snippets if helpful.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative approaches?

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of WebhookEngine would this affect?
      multiple: true
      options:
        - API
        - Dashboard
        - Delivery Worker
        - SDK (.NET)
        - Database
        - Docker / Deployment
        - Documentation
        - New Component
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or references.
