name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Send a message via the API...
        2. Check the delivery status...
        3. See the error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened instead?
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of WebhookEngine is affected?
      options:
        - API
        - Dashboard
        - Delivery Worker
        - SDK (.NET)
        - Database / Migrations
        - Docker
        - Documentation
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: WebhookEngine version or commit hash.
      placeholder: "v1.0.0 or commit abc1234"

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, .NET version, Docker version, PostgreSQL version, browser (for dashboard issues).
      placeholder: |
        - OS: macOS 15 / Ubuntu 24.04
        - .NET: 10.0
        - PostgreSQL: 17
        - Browser: Chrome 130

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant log output or error messages.
      render: shell
